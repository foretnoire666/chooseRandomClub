name: release
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "25"

      - run: |
          chmod 744 ./gradlew
          ./gradlew jar
          mkdir ./build/jpackage/tmp-build
          pushd ./build/jpackage
          jlink --no-header-files --no-man-pages --compress=zip-2 --strip-debug --add-modules java.base --output requiredJre --output ./requiredJre
          cp ../libs/chooseRandomClub.jar ./tmp-build/
          jpackage --type app-image --input  ./tmp-build --win-console --runtime-image ./requiredJre --name "chooseRandomClub" --main-jar chooseRandomClub.jar
          zip -r ./chooseRandomClub.zip ./chooseRandomClub
      - uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          body: ${{ github.ref }}
          draft: false
          prerelease: false
          file: ./build/jpackage/chooseRandomClub.zip